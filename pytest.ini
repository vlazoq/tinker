[pytest]
markers =
    e2e: end-to-end tests (require stub orchestrator, no external services)
    integration: integration tests (require Docker compose services)
    slow: tests that take > 5 seconds
asyncio_mode = auto
# --tb=short: print compact tracebacks (file + line + locals) on failure,
#   not the full wall-of-text long form but more than the default "auto".
# --strict-markers: fail immediately if a test uses an undeclared marker,
#   preventing silent typos (e.g. @pytest.mark.integartion passing silently).
addopts = --tb=short --strict-markers
