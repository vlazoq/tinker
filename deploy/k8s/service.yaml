apiVersion: v1
kind: Service
metadata:
  name: tinker
  namespace: tinker
  labels:
    app.kubernetes.io/name: tinker
    app.kubernetes.io/component: orchestrator
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tinker
  ports:
    - name: health
      port: 8081
      targetPort: 8081
      protocol: TCP
    - name: webui
      port: 8082
      targetPort: 8082
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
