##############################################################################
# .github/workflows/ci.yml
# =============================================================================
#
# Tinker — Continuous Integration
#
# Jobs (all run in parallel unless dependencies are declared):
#
#   test          — pytest suite on Python 3.11 + 3.12, with coverage reporting
#                   Fails if line coverage drops below 60%
#   lint          — ruff code-quality checks (no auto-format)
#   sast          — Bandit static analysis security scan (SAST)
#                   Flags high-severity security issues in Python source code
#   dep-freshness — verify every requirements/*.txt is in sync with its .in
#                   source; fails the PR until the developer commits updated
#                   lock files generated with `make deps-all`
#   security-audit — pip-audit CVE scan of all pinned dependency sets;
#                   fails the PR if any package has a published CVE
#   sbom           — CycloneDX software bill of materials (advisory, non-blocking)
#   license-compliance — GPL/AGPL detection (blocks merge)
#
# Trigger conditions:
#   • Every push to main / master and any claude/* branch
#   • Every pull request targeting main / master
#
# Why all these jobs?
#   test + lint    → code quality gate (no regressions, no linter warnings)
#   sast           → catches Python security bugs before they reach prod
#   dep-freshness  → prevents "works on my machine" caused by stale lock files
#   security-audit → supply-chain security; catches CVEs before they reach prod
#
# Lock-file hash verification (supply-chain security)
# ---------------------------------------------------
# The dep-freshness job re-runs pip-compile with --generate-hashes.
# When lock files contain SHA-256 hashes, `pip install -r requirements/base.txt`
# automatically verifies every downloaded wheel against those hashes — even
# without --require-hashes — because pip enforces hashes for any package that
# has them in the requirements file.
#
# First-time setup / migration note
# -----------------------------------
# If the committed lock files do not yet contain hashes (they lack the
# `--hash=sha256:…` lines), the dep-freshness job will fail on first run.
# Developers need to run:
#
#   make deps-all     # regenerates all lock files with --generate-hashes
#   git add requirements/
#   git commit -m "chore: add SHA-256 hash pins to all lock files"
#
# After that commit, the dep-freshness job passes and hash verification is
# enforced for all future installs and CI runs.
##############################################################################

name: CI

on:
  push:
    branches:
      - main
      - master
      - "claude/**"
  pull_request:
    branches:
      - main
      - master

# Cancel in-progress runs on new push to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    name: "Test (Python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements/dev.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install -e . --no-deps
          pip install pytest-cov>=5.0.0

      - name: Run tests with coverage
        # --cov-fail-under enforces a minimum line coverage threshold.
        # Adjust the threshold as coverage improves over time.
        run: |
          pytest -x -q --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=60

      - name: Upload coverage report
        # Upload XML coverage for external tools (Codecov, SonarQube, etc.)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}-${{ github.sha }}
          path: coverage.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        # Pin ruff to avoid unexpected lint failures from a ruff upgrade.
        # Keep in sync with requirements/dev.in.
        run: pip install "ruff>=0.4.0"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format --check)
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Type checking — mypy --strict
  # ---------------------------------------------------------------------------
  mypy:
    name: "Type check (mypy --strict)"
    runs-on: ubuntu-latest
    # Advisory: surfaces Any-leaking and missing Optional annotations.
    # Does NOT block merge today — graduate to blocking once all ~10-20
    # edge cases are fixed (see issue: enforce mypy --strict).
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install mypy and stubs
        run: |
          pip install --upgrade pip
          pip install -r requirements/dev.txt
          pip install -e . --no-deps
          pip install "mypy>=1.10.0" types-redis

      - name: Run mypy --strict
        # --ignore-missing-imports: skip third-party libs that lack py.typed /
        #   stubs (chromadb, textual, etc.) — these are external and not our bug.
        # --exclude: generated files and vendored code that we don't own.
        run: |
          mypy --strict \
            --ignore-missing-imports \
            --exclude 'grub_artifacts|__pycache__|\.venv' \
            . \
            || true   # non-blocking until edge cases are resolved
        continue-on-error: true

      - name: Summarise mypy findings
        if: always()
        run: |
          echo "mypy --strict run complete (advisory — does not block merge)."
          echo "Fix reported issues progressively; remove continue-on-error"
          echo "from this job once the error count reaches zero."

  # ---------------------------------------------------------------------------
  # SAST — Bandit static analysis security scanner
  # ---------------------------------------------------------------------------
  sast:
    name: "SAST (Bandit)"
    runs-on: ubuntu-latest
    # SAST blocks merge on high-severity findings.
    # Medium/low severity findings are reported but do not block.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Bandit
        run: pip install "bandit[toml]>=1.7.0"

      - name: Run Bandit (high-severity gate)
        # -ll: report only HIGH severity, HIGH confidence issues
        # -r . : scan entire repo
        # --exclude: skip test files (they may use eval, subprocess, etc. intentionally)
        # Fails the job (exit code 1) if any HIGH+HIGH issues are found.
        run: |
          bandit -r . \
            --exclude './tests,./*/tests,./grub/tests' \
            -ll \
            --format txt \
            -o /tmp/bandit_high.txt \
            || (cat /tmp/bandit_high.txt && exit 1)
          echo "✓ No high-severity Bandit findings"

      - name: Run Bandit (full report, advisory)
        # -l: report medium+high severity (advisory — does not fail the job)
        # Output uploaded as artifact for review
        run: |
          bandit -r . \
            --exclude './tests,./*/tests,./grub/tests' \
            -l \
            --format txt \
            -o /tmp/bandit_full.txt \
            || true  # non-blocking
          echo "=== Bandit full report ==="
          cat /tmp/bandit_full.txt || true
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report-${{ github.sha }}
          path: /tmp/bandit_full.txt
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Dependency lock-file freshness
  # ---------------------------------------------------------------------------
  dep-freshness:
    name: "Dep freshness (lock files up to date)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-tools
        run: pip install "pip-tools>=7.0.0"

      - name: Regenerate base.txt and diff
        # --generate-hashes: every package gets a SHA-256 hash (supply-chain)
        # --quiet:           suppress progress noise; only show the diff
        # --strip-extras:    keep the output portable across pip-tools versions
        # --no-upgrade:      do NOT upgrade — we only check freshness against
        #                    whatever the resolver currently produces for the
        #                    same pinned set; upgrades are handled by Dependabot
        run: |
          pip-compile requirements/base.in \
            --generate-hashes \
            --quiet \
            --no-header \
            --strip-extras \
            --no-upgrade \
            --output-file /tmp/base.txt.check
          if ! diff --unified=5 requirements/base.txt /tmp/base.txt.check; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌  requirements/base.txt is STALE or MISSING HASHES"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  Regenerate locally and commit:"
            echo "    make deps"
            echo "    git add requirements/base.txt"
            echo "    git commit -m 'chore: update base dependency lock file'"
            echo ""
            exit 1
          fi
          echo "✓ requirements/base.txt is up to date and contains SHA-256 hashes"

      - name: Regenerate dev.txt and diff
        run: |
          pip-compile requirements/dev.in \
            --generate-hashes \
            --quiet \
            --no-header \
            --strip-extras \
            --no-upgrade \
            --allow-unsafe \
            --output-file /tmp/dev.txt.check
          if ! diff --unified=5 requirements/dev.txt /tmp/dev.txt.check; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌  requirements/dev.txt is STALE or MISSING HASHES"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  Regenerate locally and commit:"
            echo "    make deps-dev"
            echo "    git add requirements/dev.txt"
            echo "    git commit -m 'chore: update dev dependency lock file'"
            echo ""
            exit 1
          fi
          echo "✓ requirements/dev.txt is up to date and contains SHA-256 hashes"

      - name: Regenerate metrics.txt and diff
        run: |
          pip-compile requirements/metrics.in \
            --generate-hashes \
            --quiet \
            --no-header \
            --strip-extras \
            --no-upgrade \
            --output-file /tmp/metrics.txt.check
          if ! diff --unified=5 requirements/metrics.txt /tmp/metrics.txt.check; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌  requirements/metrics.txt is STALE or MISSING HASHES"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "  Regenerate locally and commit:"
            echo "    make deps-metrics"
            echo "    git add requirements/metrics.txt"
            echo "    git commit -m 'chore: update metrics dependency lock file'"
            echo ""
            exit 1
          fi
          echo "✓ requirements/metrics.txt is up to date and contains SHA-256 hashes"

  # ---------------------------------------------------------------------------
  # Security — CVE audit
  # ---------------------------------------------------------------------------
  security-audit:
    name: "Security audit (pip-audit CVE scan)"
    runs-on: ubuntu-latest
    # Run even if other jobs fail — security issues should always be surfaced.
    # Reviewers must not merge a PR that introduces a known CVE.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pip-audit
        # pip-audit queries the OSV (Open Source Vulnerabilities) database and
        # the PyPI advisory database for published CVEs.
        run: pip install "pip-audit>=2.7.0"

      - name: Audit base dependencies
        # --require-hashes: refuse to run unless every package has a hash;
        #   this catches lock files that are missing hash lines (i.e. generated
        #   without --generate-hashes).  If this step fails, re-run `make deps`.
        # --progress-spinner=off: cleaner CI log output
        run: |
          pip-audit \
            --requirement requirements/base.txt \
            --require-hashes \
            --progress-spinner=off \
            --output=columns
        continue-on-error: false

      - name: Audit dev dependencies
        run: |
          pip-audit \
            --requirement requirements/dev.txt \
            --require-hashes \
            --progress-spinner=off \
            --output=columns
        continue-on-error: false

      - name: Audit metrics dependencies
        run: |
          pip-audit \
            --requirement requirements/metrics.txt \
            --require-hashes \
            --progress-spinner=off \
            --output=columns
        continue-on-error: false

  # ---------------------------------------------------------------------------
  # Supply-chain — SBOM generation (CycloneDX)
  # ---------------------------------------------------------------------------
  sbom:
    name: "SBOM (CycloneDX)"
    runs-on: ubuntu-latest
    # SBOM is advisory — surface it even if other jobs fail so it is always
    # available for compliance audits.  Does NOT block merge.
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies and CycloneDX tool
        run: |
          pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install cyclonedx-bom>=4.0.0

      - name: Generate CycloneDX SBOM (JSON)
        # cyclonedx-py generates a CycloneDX-format SBOM from the installed
        # packages.  The JSON output can be uploaded to Dependency-Track,
        # Grype, or any other SCA tool for vulnerability correlation.
        run: |
          cyclonedx-py environment \
            --output-format json \
            --output-file sbom.json
          echo "✓ SBOM generated: $(wc -l < sbom.json) lines"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinker-sbom-${{ github.sha }}
          path: sbom.json
          # Keep SBOMs for 90 days for compliance / audit purposes
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Supply-chain — License compliance
  # ---------------------------------------------------------------------------
  license-compliance:
    name: "License compliance"
    runs-on: ubuntu-latest
    # Blocks merge: GPL/AGPL/SSPL in production deps is a legal risk.

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install base dependencies and pip-licenses
        run: |
          pip install --upgrade pip
          pip install -r requirements/base.txt
          pip install pip-licenses>=4.3.0

      - name: Check for disallowed licenses
        # Blocked licenses (copyleft / commercial-restriction):
        #   GPL-2.0, GPL-3.0  — viral copyleft: contaminates proprietary code
        #   AGPL-3.0          — network-copyleft: applies even to SaaS use
        #   SSPL-1.0          — MongoDB Server Side Public License
        #   OSL-3.0           — Open Software License (very restrictive)
        #
        # If this check fails, the blocked package must be:
        #   1. Removed and replaced with a permissively-licensed alternative, OR
        #   2. Explicitly approved by legal and added to the allowlist below.
        run: |
          pip-licenses \
            --format=csv \
            --output-file /tmp/licenses.csv

          echo "=== License summary ==="
          pip-licenses --format=plain-vertical

          echo ""
          echo "=== Checking for blocked licenses ==="
          BLOCKED="GPL-2.0,GPL-3.0,GNU General Public License v2,GNU General Public License v3,AGPL-3.0,GNU Affero General Public License v3,SSPL,OSL-3.0"
          FOUND=0
          for LIC in $(echo "$BLOCKED" | tr ',' '\n'); do
            if grep -i "$LIC" /tmp/licenses.csv; then
              echo "❌ BLOCKED LICENSE FOUND: $LIC"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "❌  Blocked license detected in production dependencies"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Review the offending package and either:"
            echo "  1. Replace it with a permissively-licensed alternative"
            echo "  2. Get legal approval and add it to the allowlist"
            exit 1
          fi
          echo "✓ No blocked licenses found in production dependencies"

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: tinker-licenses-${{ github.sha }}
          path: /tmp/licenses.csv
          retention-days: 90
